<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WOS 공지</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b1020;
  color:#e9ecf1;
  margin:0;
  padding:12px;
}
h1{
  font-size:20px;
  margin-bottom:12px;
}
.categories{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.cat-btn{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #35508a;
  background:#0f1a3a;
  color:#cfe1ff;
  font-size:13px;
  cursor:pointer;
}
.cat-btn.active{
  background:#2563eb;
  border-color:#2563eb;
  color:#fff;
}
.card{
  background:#151c32;
  border:1px solid #26304f;
  border-radius:14px;
  padding:14px;
  margin-bottom:16px;
}
.title{
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
}
.meta{
  color:#9aa3b2;
  font-size:12px;
  margin-bottom:10px;
}
.content{
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.6;
}
.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}
button{
  flex:1;
  padding:10px;
  font-size:14px;
  border-radius:10px;
  border:1px solid #35508a;
  background:#0f1a3a;
  color:#fff;
  cursor:pointer;
}
button.secondary{
  background:#0c1430;
}
</style>
</head>

<body>

<h1>📢 WOS 공지</h1>

<div class="categories" id="categoryBar"></div>
<div id="list">불러오는 중…</div>

<script>
const API = "https://api.github.com/repos/seollock0/WOS/issues";

const CATEGORIES = [
  "전체",
  "SvS준비전",
  "SvS전쟁단계",
  "성채&요새점령",
  "곰사냥",
  "기타 정기이벤트",
  "일반 공지"
];

let currentCategory = "전체";
let allIssues = [];

function extractNoticeBody(body){
  const marker = "### 공지 내용";
  const idx = body?.indexOf(marker);
  return idx === -1 ? body?.trim() : body.slice(idx + marker.length).trim();
}

function renderCategories(){
  const bar = document.getElementById("categoryBar");
  bar.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === currentCategory ? " active" : "");
    btn.innerText = cat;
    btn.onclick = () =>{
      currentCategory = cat;
      renderCategories();
      renderList();
    };
    bar.appendChild(btn);
  });
}

function renderList(){
  const root = document.getElementById("list");
  root.innerHTML = "";

  const filtered = currentCategory === "전체"
    ? allIssues
    : allIssues.filter(issue =>
        issue.labels.some(l => l.name === currentCategory)
      );

  if(filtered.length === 0){
    root.innerHTML = "<div style='color:#9aa3b2;'>해당 카테고리 공지가 없습니다.</div>";
    return;
  }

  filtered.forEach(issue=>{
    const body = extractNoticeBody(issue.body);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${issue.title}</div>
      <div class="meta">#${issue.number} · ${issue.created_at.slice(0,10)}</div>
      <div class="content">${body}</div>
      <div class="actions">
        <button>📋 본문 복사</button>
        <button class="secondary">✏️ GitHub에서 수정</button>
      </div>
    `;

    card.querySelector("button").onclick = ()=>{
      navigator.clipboard.writeText(body);
      alert("공지 본문 복사 완료");
    };

    card.querySelector(".secondary").onclick = ()=>{
      window.open(issue.html_url,"_blank");
    };

    root.appendChild(card);
  });
}

fetch(API)
  .then(r=>r.json())
  .then(data=>{
    allIssues = data.filter(i=>!i.pull_request);
    renderCategories();
    renderList();
  });
</script>

</body>
</html>
