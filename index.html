<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WOS 공지</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b1020;
  color:#e9ecf1;
  margin:0;
  padding:12px;
}
h1{
  font-size:20px;
  margin-bottom:16px;
}
.card{
  background:#151c32;
  border:1px solid #26304f;
  border-radius:14px;
  padding:14px;
  margin-bottom:16px;
}
.title{
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
}
.meta{
  color:#9aa3b2;
  font-size:12px;
  margin-bottom:10px;
}
.content{
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.6;
}
.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}
button{
  flex:1;
  padding:10px;
  font-size:14px;
  border-radius:10px;
  border:1px solid #35508a;
  background:#0f1a3a;
  color:#fff;
  cursor:pointer;
}
button.secondary{
  background:#0c1430;
}
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#0e2338;
  border:1px solid #2b5ea6;
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  display:none;
}
</style>
</head>

<body>

<h1>📢 WOS 공지</h1>
<div id="list">불러오는 중…</div>

<div id="toast" class="toast"></div>

<script>
const API = "https://api.github.com/repos/seollock0/WOS/issues";
const toast = document.getElementById("toast");

/**
 * ✅ Issue 본문에서 "### 공지 내용" 이후만 추출
 * - 카테고리 / 날짜 / 헤더는 완전히 제거
 */
function extractNoticeBody(body){
  if(!body) return "";

  const marker = "### 공지 내용";
  const idx = body.indexOf(marker);

  if(idx === -1){
    return body.trim();
  }

  return body
    .slice(idx + marker.length)
    .trim();
}

function showToast(msg){
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => {
    toast.style.display = "none";
  }, 1200);
}

fetch(API)
  .then(r => r.json())
  .then(issues => {
    const root = document.getElementById("list");
    root.innerHTML = "";

    issues.forEach(issue => {
      if(issue.pull_request) return;

      const noticeBody = extractNoticeBody(issue.body);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="title">${issue.title}</div>
        <div class="meta">#${issue.number} · ${issue.created_at.slice(0,10)}</div>
        <div class="content">${noticeBody}</div>
        <div class="actions">
          <button class="copy-btn">📋 본문 복사</button>
          <button class="secondary edit-btn">✏️ GitHub에서 수정</button>
        </div>
      `;

      // ✅ 공지 본문만 복사
      card.querySelector(".copy-btn").onclick = () => {
        navigator.clipboard.writeText(noticeBody);
        showToast("공지 본문 복사 완료");
      };

      // GitHub Issue 편집 화면 이동
      card.querySelector(".edit-btn").onclick = () => {
        window.open(issue.html_url, "_blank");
      };

      root.appendChild(card);
    });
  });
</script>

</body>
</html>
